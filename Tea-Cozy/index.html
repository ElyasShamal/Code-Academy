<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tea Cozy</title>
    <!--CSS link-->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!--Header-->
    <header class="header" role="navigation">
      <div class="logo">
        <img
          src="./projects-images/img-tea-cozy-logo.png"
          class="logo"
          alt="logo image"
        />
      </div>
      <nav class="navbar" role="navigation">
        <ul class="navigation-list">
          <li></li>
          <li class="list-items"><a href="#">Mission</a></li>
          <li class="list-items"><a href="#">Featured Tea</a></li>
          <li class="list-items"><a href="#">Locations</a></li>
        </ul>
      </nav>
    </header>

    <!--Main-->
    <main class="container">
      <section class="image-section">
        <img
          class="container-image"
          src="./projects-images/img-mission-background.jpg"
          alt="main img-mission-background"
        />
        <!--bunner section-->
        <section class="bunner">
          <h2 class="subtitle">Our Mission</h2>
          <h3>
            Handpicked, Artisanally Curated, Free Range, Sustainable, Small
            Batch, Fair Trade, Organic Tea
          </h3>
        </section>
      </section>

      <!--Tea Section-->
      <section class="Tea-section">
        <h1 class="tea-title">Tea Of the Month</h1>
        <p class="Tea-description">What's Steeping at The Tea Cozy?</p>

        <section class="flex">
          <div class="flex-item"></div>
          <div class="flex-item"></div>
          <div class="flex-item"></div>
          <div class="flex-item"></div>
          <div class="flex-item"></div>
        </section>
      </section>
    </main>
  </body>
</html>
