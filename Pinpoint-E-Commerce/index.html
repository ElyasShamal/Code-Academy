<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinpoint E Commerce</title>
    <!-- fontawesome icon-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <!--google font-->
    <link
      href="https://fonts.googleapis.com/css?family=Roboto:400,700"
      rel="stylesheet"
    />
    <!--CSS Link-->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!--Header-->
    <header class="header">
      <div>
        <span class="logo">Pin Point</span>
        <!-- <span>Categories</span>
        <span style="color: orange"> Your Cart</span> -->
      </div>
      <div class="search-bar">
        <input type="text" placeholder="Seach ..." />
      </div>
      <div class="search-buttom">
        <i class="fa fa-search" style="font-size: 22px"></i>
        <button class="Login">Login</button>
      </div>
    </header>

    <!--Main-->
    <main class="main">
      <section class="checkout">
        <h1 class="title">Checkout Details</h1>
        <p class="description">
          Please enter your information below. All fields are required.
        </p>
      </section>

      <section class="form-section" aria-label="contach-form">
        <form action="/" method="post" class="form">
          <div class="alert">
            <p class="information">
              <i
                class="fa fa-exclamation-triangle"
                style="font-size: 18px; color: orange"
              ></i>
              Looks like your forgot to add your Payment Method!
            </p>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
